<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test widget chatbot</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; color: #1e293b; }
    p { color: #64748b; font-size: 0.9rem; }
    label { display: block; margin-top: 1rem; font-weight: 500; color: #334155; }
    input { width: 100%; padding: 0.5rem 0.75rem; margin-top: 0.25rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; background: #4f46e5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
    button:hover { background: #4338ca; }
    .hint { background: #f8fafc; padding: 1rem; border-radius: 8px; margin-top: 1.5rem; font-size: 0.85rem; color: #475569; }
  </style>
</head>
<body>
  <h1>Test widget chatbot</h1>
  <p>Usa questa pagina per provare il widget in locale. Il bottone della chat apparirà in basso a destra.</p>

  <label for="apiUrl">URL dell’app (es. http://localhost:8000)</label>
  <input type="text" id="apiUrl" value="" placeholder="http://localhost:8000">

  <label for="apiKey">API Key (copia da Admin → Aziende → [Azienda] → Chatbot per il sito)</label>
  <input type="text" id="apiKey" value="" placeholder="ck_...">

  <button type="button" id="loadBtn">Carica widget</button>

  <div class="hint">
    <strong>Dove trovare l’API Key:</strong> accedi al pannello admin, apri un’azienda, nella sezione «Chatbot per il sito» copia l’API Key o il codice embed.
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('key')) document.getElementById('apiKey').value = params.get('key');
      if (!document.getElementById('apiUrl').value)
        document.getElementById('apiUrl').value = window.location.origin;

      document.getElementById('loadBtn').addEventListener('click', function() {
        var apiUrl = (document.getElementById('apiUrl').value || '').replace(/\/$/, '');
        var apiKey = (document.getElementById('apiKey').value || '').trim();
        if (!apiKey) { alert('Inserisci l’API Key'); return; }
        if (!apiUrl) { alert('Inserisci l’URL dell’app'); return; }

        var existing = document.getElementById('pscompany-chatbot-root');
        if (existing) existing.remove();
        var s = document.querySelector('script[data-api-key]');
        if (s) s.remove();

        var script = document.createElement('script');
        script.src = apiUrl + '/widget.js';
        script.setAttribute('data-api-key', apiKey);
        script.setAttribute('data-api-url', apiUrl);
        document.body.appendChild(script);
      });
    })();
  </script>
</body>
</html>
